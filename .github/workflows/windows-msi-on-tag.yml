name: Build Windows Installers

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build-windows-msi:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          $wixCommand = Get-Command candle.exe -ErrorAction SilentlyContinue
          if (-not $wixCommand) {
            choco upgrade wixtoolset --yes --no-progress
            $wixCommand = Get-Command candle.exe -ErrorAction SilentlyContinue
          }

          if (-not $wixCommand) {
            $wixBin = Get-ChildItem @(${env:ProgramFiles(x86)}, ${env:ProgramFiles}) -Directory -Filter 'WiX Toolset*' -ErrorAction SilentlyContinue |
              Sort-Object Name -Descending |
              ForEach-Object { Join-Path $_.FullName 'bin' } |
              Where-Object { Test-Path (Join-Path $_ 'candle.exe') } |
              Select-Object -First 1

            if (-not $wixBin) {
              throw 'WiX Toolset bin directory not found'
            }

            $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:Path = "$wixBin;$env:Path"
            $wixCommand = Get-Command candle.exe -ErrorAction SilentlyContinue
          }

          if (-not $wixCommand) {
            throw 'WiX Toolset is installed but candle.exe is still unavailable'
          }

          $wixBin = Split-Path -Parent $wixCommand.Source
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Derive app version from tag
        shell: pwsh
        run: |
          $tagName = $env:GITHUB_REF_NAME
          if ($tagName -notmatch '^v(\d+)\.(\d+)\.(\d+)$') {
            throw 'Tag must match vMAJOR.MINOR.BUILD'
          }

          $version = $tagName.Substring(1)
          $releaseTags = @(git tag --list 'v*.*.*')
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to read git tags'
          }

          if ($releaseTags.Count -eq 0) {
            throw 'No release tags were found after checkout'
          }

          $versionCode = $releaseTags.Count

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION_CODE=$versionCode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using app version $version and versionCode $versionCode"

      - name: Print build tool versions
        shell: pwsh
        run: |
          java -version
          .\gradlew.bat --version
          $wixCommand = Get-Command candle.exe -ErrorAction Stop
          Write-Host "WiX binary: $($wixCommand.Source)"

      - name: Run release verification tests
        shell: pwsh
        env:
          ORG_GRADLE_PROJECT_appVersion: ${{ env.APP_VERSION }}
          ORG_GRADLE_PROJECT_appVersionCode: ${{ env.APP_VERSION_CODE }}
          ORG_GRADLE_PROJECT_appCommitHash: ${{ github.sha }}
        run: .\gradlew.bat :composeApp:jvmTest :composeApp:test --stacktrace --no-daemon

      - name: Build release Windows installers
        shell: pwsh
        env:
          ORG_GRADLE_PROJECT_appVersion: ${{ env.APP_VERSION }}
          ORG_GRADLE_PROJECT_appVersionCode: ${{ env.APP_VERSION_CODE }}
          ORG_GRADLE_PROJECT_appCommitHash: ${{ github.sha }}
        run: .\gradlew.bat :composeApp:packageReleaseDistributionForCurrentOS --stacktrace --no-daemon

      - name: Materialize Windows signing certificate
        if: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 != '' && secrets.WINDOWS_SIGNING_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'windows-signing-cert.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String('${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}'))
          "WINDOWS_SIGNING_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign Windows installers
        if: ${{ env.WINDOWS_SIGNING_CERT_PATH != '' }}
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGNING_TIMESTAMP_URL || 'http://timestamp.digicert.com' }}
        run: |
          $artifacts = @(
            Get-ChildItem 'composeApp/build/compose/binaries/main-release/msi/*.msi' -ErrorAction SilentlyContinue
            Get-ChildItem 'composeApp/build/compose/binaries/main-release/exe/*.exe' -ErrorAction SilentlyContinue
          ) | Where-Object { $_ -ne $null }

          if ($artifacts.Count -eq 0) {
            throw 'No Windows installer artifacts found to sign'
          }

          foreach ($artifact in $artifacts) {
            & signtool sign /fd SHA256 /f "$env:WINDOWS_SIGNING_CERT_PATH" /p "$env:WINDOWS_SIGNING_CERT_PASSWORD" /tr "$env:WINDOWS_SIGNING_TIMESTAMP_URL" /td SHA256 "$($artifact.FullName)"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to sign $($artifact.FullName)"
            }

            & signtool verify /pa "$($artifact.FullName)"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to verify signature for $($artifact.FullName)"
            }
          }

      - name: Upload Gradle reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports-${{ env.APP_VERSION || github.run_id }}
          path: |
            build/reports/**
            composeApp/build/reports/**
            composeApp/build/compose/logs/**
            androidApp/build/reports/**
          if-no-files-found: ignore

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: certificates-windows-msi-${{ env.APP_VERSION }}
          path: composeApp/build/compose/binaries/main-release/msi/*.msi
          if-no-files-found: error

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: certificates-windows-exe-${{ env.APP_VERSION }}
          path: composeApp/build/compose/binaries/main-release/exe/*.exe
          if-no-files-found: error
