name: Build Windows MSI

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows-msi:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          $wixCommand = Get-Command candle.exe -ErrorAction SilentlyContinue
          if (-not $wixCommand) {
            choco upgrade wixtoolset --yes --no-progress
            $wixCommand = Get-Command candle.exe -ErrorAction SilentlyContinue
          }

          if (-not $wixCommand) {
            $wixBin = Get-ChildItem @(${env:ProgramFiles(x86)}, ${env:ProgramFiles}) -Directory -Filter 'WiX Toolset*' -ErrorAction SilentlyContinue |
              Sort-Object Name -Descending |
              ForEach-Object { Join-Path $_.FullName 'bin' } |
              Where-Object { Test-Path (Join-Path $_ 'candle.exe') } |
              Select-Object -First 1

            if (-not $wixBin) {
              throw 'WiX Toolset bin directory not found'
            }

            $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:Path = "$wixBin;$env:Path"
            $wixCommand = Get-Command candle.exe -ErrorAction SilentlyContinue
          }

          if (-not $wixCommand) {
            throw 'WiX Toolset is installed but candle.exe is still unavailable'
          }

          $wixBin = Split-Path -Parent $wixCommand.Source
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Derive app version from tag
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vMAJOR.MINOR.BUILD" >&2
            exit 1
          fi
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build release MSI
        shell: pwsh
        run: .\gradlew.bat :composeApp:packageReleaseMsi -PappVersion=${env:APP_VERSION}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: certificates-windows-msi-${{ env.APP_VERSION }}
          path: composeApp/build/compose/binaries/main-release/msi/*.msi
          if-no-files-found: error
